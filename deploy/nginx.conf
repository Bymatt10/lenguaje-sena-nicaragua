# Nginx para lenguaje.chepeonline.com (VPS + Let's Encrypt)
# Tras instalar certbot, ajusta los paths de los certificados y descomenta las
# líneas ssl_certificate / ssl_certificate_key dentro del bloque 443.

# Redirige HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name lenguaje.chepeonline.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lenguaje.chepeonline.com;

    # ssl_certificate     /etc/letsencrypt/live/lenguaje.chepeonline.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/lenguaje.chepeonline.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(self), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data: blob:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://cdn.jsdelivr.net; media-src 'self' blob:; worker-src 'self' blob:; camera 'self'; frame-ancestors 'none'; base-uri 'self';" always;

    client_max_body_size 1m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 60s;

    # Raíz para la web estática
    root /var/www/lengua-lsp/web;
    index index.html;

    # Recursos estáticos cacheados
    location ~* \.(css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location /videos/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Bloquea el acceso a rutas internas
    location ~ ^/(dataset_contrib|models|frame_actions|data|tmp|logs|tools|deploy|jetson-nano)/ {
        deny all;
        return 404;
    }

    location ~ /\.(env|git|gitignore|venv|idea|vscode) {
        deny all;
        return 404;
    }

    # WebSocket / long-poll para TFJS y el server
    location / {
        try_files $uri $uri/ @flask;
    }

    location @flask {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }
}